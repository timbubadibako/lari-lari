</header>
<main class="px-margin-mobile pt-8 space-y-8 max-w-2xl mx-auto">

<div class="relative z-10">

<div class="w-16 h-16 rounded-full border-2 border-on-background overflow-hidden bg-surface">
<img alt="Pilot Avatar" class="w-full h-full object-cover" data-alt="A gritty, high-contrast portrait of an urban runner with athletic gear, illuminated by harsh red neon light against a dark city background. The aesthetic is raw and Neo-Brutalist, focusing on sharp shadows and professional performance textures. Deep blacks and vibrant Merah red define the lighting, conveying a sense of high-intensity athletic focus." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAW2wLHTiqF_i80RRUpAnzcfaVC5M8P6zskWVjj67kB_h8TT9nLjTc-YPw20zXPGWlj4-HsOpjEfPRnADJnBZj-HyoG_JeNdoyR4jDFqRgVHl_nD852NWBcCZ97J-S_M04rg_VypRnNwCzx29RRF-yXh4lrqAQalkItjlKH4dq3yU2J6wS9kZDTcyexl5gFkhbGf0n21QxvJ9EbMXQns8hoY_ZT39GX_3QpBxzr9KJxL1juqZJ3d5HZPWF6Vb-tybInjJ7_IAwOXlG_"/>

<div>

</div>
</div>
</div>

<!-- Settings List -->
<div class="space-y-4">
<div class="bg-surface border-2 border-on-background neo-shadow divide-y-2 divide-on-background">
<!-- ACCOUNT PRIVACY -->
<button class="w-full flex items-center justify-between p-5 hover:bg-surface-variant transition-colors group">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-background" data-icon="shield_person">shield_person</span>
<span class="font-bold text-lg">ACCOUNT PRIVACY</span>
</div>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<!-- GUILD SETTINGS -->
<button class="w-full flex items-center justify-between p-5 hover:bg-surface-variant transition-colors group">
<div class="flex items-center gap-4">

<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>

<span class="font-label-caps text-label-caps mt-1">PILOT</span>
</a>

<script>
        // Simple click interaction for Ghost Mode button toggle
        const ghostBtn = document.querySelector('.bg-primary-container');
        let isGhost = false;
        
        ghostBtn.addEventListener('click', () => {
            isGhost = !isGhost;
            if (isGhost) {
                ghostBtn.classList.remove('bg-primary-container', 'text-on-primary-container');
                ghostBtn.classList.add('bg-on-background', 'text-surface');
                ghostBtn.querySelector('span:last-child').textContent = 'GHOST MODE ACTIVE';
            } else {
                ghostBtn.classList.add('bg-primary-container', 'text-on-primary-container');
                ghostBtn.classList.remove('bg-on-background', 'text-surface');
                ghostBtn.querySelector('span:last-child').textContent = 'ENABLE GHOST MODE';
            }
        });
    </script>
