<body class="bg-background text-on-background">

<div class="flex-1 min-w-0 flex flex-col justify-between">
<div>

<div class="flex items-end gap-2 mt-1">

</div>
</div>

</div>
<div class="bg-secondary-container px-2 py-0.5 border-2 border-on-background">
<span class="font-label-caps text-label-caps text-on-secondary-container">180 XP</span>
</div>
</div>
</div>
</div>
</div>
<!-- Log Entry 2 -->
<div class="group relative bg-surface border-2 border-on-background p-4 shadow-[6px_6px_0px_0px_rgba(27,28,25,1)] transition-all active:translate-x-[4px] active:translate-y-[4px] active:shadow-none cursor-pointer">
<div class="flex gap-4">

</div>
<div class="flex-1 min-w-0 flex flex-col justify-between">
<div>
<div class="flex justify-between items-start">
<span class="font-label-caps text-label-caps text-on-surface-variant">MAY 17, 2026</span>

</div>
<div class="flex items-end gap-2 mt-1">

<span class="font-label-caps text-label-caps pb-1">KM</span>
</div>
</div>
<div class="flex justify-between items-center mt-2">

</div>
</div>
<!-- Log Entry 3 -->

</div>
<div class="flex-1 min-w-0 flex flex-col justify-between">
<div>
<div class="flex justify-between items-start">
<span class="font-label-caps text-label-caps text-on-surface-variant">MAY 15, 2026</span>
<span class="material-symbols-outlined font-bold">chevron_right</span>
</div>
<div class="flex items-end gap-2 mt-1">

</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-surface border-t-2 border-on-background">
<!-- MAPS -->

<span class="material-symbols-outlined mb-1">map</span>

</a>
<!-- TERRITORY -->

</a>
<!-- LOGS (Active) -->

<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">history</span>
<span class="font-label-caps text-label-caps">LOGS</span>
</a>
<!-- PILOT -->
<a class="flex flex-col items-center justify-center text-on-surface-variant opacity-70 hover:text-primary transition-all active:scale-95 duration-75" href="#">
<span class="material-symbols-outlined mb-1">person</span>
<span class="font-label-caps text-label-caps">PILOT</span>
</a>
</nav>
<script>
        // Simple micro-interaction for cards
        document.querySelectorAll('.group.relative').forEach(card => {
            card.addEventListener('mousedown', () => {
                card.style.transform = 'translate(4px, 4px)';
                card.style.boxShadow = 'none';
            });
            card.addEventListener('mouseup', () => {
                card.style.transform = '';
                card.style.boxShadow = '';
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = '';
                card.style.boxShadow = '';
            });
        });

        // Filter button toggle logic
        const filters = document.querySelectorAll('nav.flex button');
        filters.forEach(btn => {
            btn.addEventListener('click', () => {
                filters.forEach(b => {
                    b.classList.remove('bg-secondary-container', 'text-on-secondary-container', 'shadow-[4px_4px_0px_0px_rgba(27,28,25,1)]', 'active:translate-x-[2px]', 'active:translate-y-[2px]');
                    b.classList.add('bg-surface', 'hover:bg-surface-variant');
                });
                btn.classList.add('bg-secondary-container', 'text-on-secondary-container', 'shadow-[4px_4px_0px_0px_rgba(27,28,25,1)]', 'active:translate-x-[2px]', 'active:translate-y-[2px]');
                btn.classList.remove('bg-surface', 'hover:bg-surface-variant');
            });
        });
    </script>
