name: LARI CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./lari-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./lari-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: TypeScript Check
        run: npx tsc --noEmit

      # TODO: Uncomment and configure tests when testing suite (Jest) is ready
      # - name: Run Unit Tests
      #   run: npm test

      # TODO: Add EAS Build step here for automated APK/IPA generation in the future
